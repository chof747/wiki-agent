name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Docker Image
    if: github.repository == 'chof747/wiki-agent'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=long,prefix=sha-,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value={{branch}}-sha-{{sha}},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for smoke verification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          platforms: linux/amd64
          tags: wiki-agent-smoke:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test wiki-agent --help
        run: docker run --rm wiki-agent-smoke:${{ github.sha }} --help

      - name: Push tags to GHCR
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi

            docker tag wiki-agent-smoke:${{ github.sha }} "$tag"
            docker push "$tag"
          done <<EOF
          $IMAGE_TAGS
          EOF
