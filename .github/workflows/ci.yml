name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pytest:
    name: CI / pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run pytest baseline
        run: uv run pytest

  integration:
    name: CI / integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: integration
          POSTGRES_PASSWORD: integration
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U integration -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run harness-backed integration slice
        env:
          WIKI_AGENT_INTEGRATION_ADMIN_DSN: postgresql://integration:integration@127.0.0.1:5432/postgres
          WIKI_AGENT_INTEGRATION_RUNTIME_DSN: postgresql://integration:integration@127.0.0.1:5432/wiki_agent_integration
        run: uv run wiki-agent-integration test
