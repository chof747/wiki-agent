name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Compute docs-only change classification
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute docs-only change classification
        id: classify
        run: |
          python -m tools.docs_only_changes from-github-event \
            "${{ github.event_name }}" \
            "${{ github.event_path }}" \
            --github-output "${GITHUB_OUTPUT}"

  pytest:
    name: CI / pytest
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: No-op for docs-only changes
        if: needs.changes.outputs.docs_only == 'true'
        run: |
          echo "Docs-only change set detected; skipping pytest execution."

      - name: Check out repository
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        if: needs.changes.outputs.docs_only != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Sync locked dev environment
        if: needs.changes.outputs.docs_only != 'true'
        run: uv sync --locked --dev

      - name: Run pytest baseline
        if: needs.changes.outputs.docs_only != 'true'
        run: uv run pytest

  integration:
    name: CI / integration
    needs: changes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: integration
          POSTGRES_PASSWORD: integration
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U integration -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: No-op for docs-only changes
        if: needs.changes.outputs.docs_only == 'true'
        run: |
          echo "Docs-only change set detected; skipping integration execution."

      - name: Check out repository
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        if: needs.changes.outputs.docs_only != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Sync locked dev environment
        if: needs.changes.outputs.docs_only != 'true'
        run: uv sync --locked --dev

      - name: Run harness-backed integration slice
        if: needs.changes.outputs.docs_only != 'true'
        env:
          WIKI_AGENT_INTEGRATION_ADMIN_DSN: postgresql://integration:integration@127.0.0.1:5432/postgres
          WIKI_AGENT_INTEGRATION_RUNTIME_DSN: postgresql://integration:integration@127.0.0.1:5432/wiki_agent_integration
        run: uv run wiki-agent-integration test

      - name: Dump Wiki-Go harness container on failure
        if: failure() && needs.changes.outputs.docs_only != 'true'
        run: |
          docker ps -a
          docker logs wiki-agent-integration-harness || true
